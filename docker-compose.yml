services:
  postgres:
    image: postgres:16
    container_name: rowad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rowad
      POSTGRES_PASSWORD: rowad_local_dev
      POSTGRES_DB: data_warehouse
    ports:
      - "5433:5432"
    volumes:
      - rowad_pg_data:/var/lib/postgresql/data

volumes:
  rowad_pg_data:
